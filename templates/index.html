<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>URL Screener</title>
  <style>
    /* ---- Design tokens -------------------------------------------------- */
    :root {
      --bg: #0f172a;
      --bg-soft: #1e293b;
      --card: #ffffff;
      --text: #0f172a;
      --muted: #64748b;
      --border: #e2e8f0;
      --accent: #4f46e5;
      --accent-hover: #4338ca;
      --danger: #dc2626;
      --shadow: 0 10px 30px rgba(2, 6, 23, 0.25);
      --radius: 14px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: radial-gradient(1200px 600px at 20% -10%, #312e81 0%, transparent 60%),
                  radial-gradient(1000px 500px at 100% 0%, #0e7490 0%, transparent 55%),
                  var(--bg);
      color: var(--text);
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 48px 16px;
    }

    .wrap { width: 100%; max-width: 680px; }

    /* ---- Header --------------------------------------------------------- */
    header { text-align: center; margin-bottom: 28px; color: #e2e8f0; }
    header h1 {
      margin: 0 0 8px;
      font-size: 2rem;
      letter-spacing: -0.02em;
      display: flex; align-items: center; justify-content: center; gap: 10px;
    }
    header p { margin: 0; color: #94a3b8; font-size: 0.98rem; }

    /* ---- Card / form ---------------------------------------------------- */
    .card {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 24px;
    }

    label { display: block; font-weight: 600; font-size: 0.9rem; margin-bottom: 8px; }

    .input-row { display: flex; gap: 10px; flex-wrap: wrap; }

    input[type="url"] {
      flex: 1 1 260px;
      padding: 13px 14px;
      font-size: 1rem;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    input[type="url"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.15);
    }

    button {
      font-size: 1rem;
      font-weight: 600;
      border: none;
      border-radius: 10px;
      padding: 13px 18px;
      cursor: pointer;
      transition: background 0.15s, transform 0.05s, opacity 0.15s;
    }
    button:active { transform: translateY(1px); }

    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }

    .btn-ghost { background: transparent; color: var(--muted); border: 1.5px solid var(--border); }
    .btn-ghost:hover { color: var(--danger); border-color: var(--danger); }

    .actions { margin-top: 12px; display: flex; justify-content: flex-end; }

    /* ---- States --------------------------------------------------------- */
    .hidden { display: none !important; }

    .status { margin-top: 18px; font-size: 0.95rem; }
    .status .spinner {
      display: inline-block; width: 16px; height: 16px; vertical-align: -3px;
      border: 2.5px solid rgba(79,70,229,0.25); border-top-color: var(--accent);
      border-radius: 50%; animation: spin 0.7s linear infinite; margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .error {
      margin-top: 18px; padding: 12px 14px; border-radius: 10px;
      background: #fef2f2; color: var(--danger); border: 1px solid #fecaca;
      font-size: 0.95rem;
    }

    /* ---- Results -------------------------------------------------------- */
    .results { margin-top: 22px; border-top: 1px solid var(--border); padding-top: 20px; }

    .result-url {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 0.85rem; color: var(--accent); text-decoration: none;
      word-break: break-all; margin-bottom: 14px;
    }
    .result-url:hover { text-decoration: underline; }

    .field { margin-bottom: 18px; }
    .field-label {
      font-size: 0.72rem; font-weight: 700; letter-spacing: 0.08em;
      text-transform: uppercase; color: var(--muted); margin-bottom: 6px;
    }
    .field-value { font-size: 1rem; line-height: 1.55; }
    .field-title { font-size: 1.2rem; font-weight: 700; line-height: 1.35; }

    footer { text-align: center; margin-top: 22px; color: #64748b; font-size: 0.8rem; }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>🔎 URL Screener</h1>
      <p>Paste any website link to get a quick description and summary.</p>
    </header>

    <div class="card">
      <form id="screen-form">
        <label for="url-input">Website URL</label>
        <div class="input-row">
          <input
            id="url-input"
            type="url"
            placeholder="example.com or https://example.com"
            autocomplete="off"
            required
          />
          <button type="submit" class="btn-primary" id="screen-btn">Screen URL</button>
        </div>
        <div class="actions">
          <button type="button" class="btn-ghost hidden" id="clear-btn">Clear results</button>
        </div>
      </form>

      <!-- Loading status -->
      <div class="status hidden" id="status">
        <span class="spinner"></span>Fetching and analyzing the page&hellip;
      </div>

      <!-- Error message -->
      <div class="error hidden" id="error"></div>

      <!-- Results -->
      <div class="results hidden" id="results">
        <a class="result-url" id="result-url" href="#" target="_blank" rel="noopener"></a>

        <div class="field">
          <div class="field-label">Title</div>
          <div class="field-value field-title" id="result-title"></div>
        </div>

        <div class="field">
          <div class="field-label">Description</div>
          <div class="field-value" id="result-description"></div>
        </div>

        <div class="field">
          <div class="field-label">Auto Summary</div>
          <div class="field-value" id="result-summary"></div>
        </div>
      </div>
    </div>

    <footer>Built with Flask &middot; Summaries are generated locally from page content.</footer>
  </div>

  <script>
    // --- Grab the elements we'll need to read from / write to. ----------
    const form        = document.getElementById("screen-form");
    const urlInput    = document.getElementById("url-input");
    const screenBtn   = document.getElementById("screen-btn");
    const clearBtn    = document.getElementById("clear-btn");
    const statusBox   = document.getElementById("status");
    const errorBox    = document.getElementById("error");
    const resultsBox  = document.getElementById("results");
    const resultUrl   = document.getElementById("result-url");
    const resultTitle = document.getElementById("result-title");
    const resultDesc  = document.getElementById("result-description");
    const resultSumm  = document.getElementById("result-summary");

    // Small helpers to toggle visibility.
    const show = (el) => el.classList.remove("hidden");
    const hide = (el) => el.classList.add("hidden");

    // --- Handle form submission -----------------------------------------
    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      const url = urlInput.value.trim();
      if (!url) return;

      // Reset UI into the "loading" state.
      hide(errorBox);
      hide(resultsBox);
      show(statusBox);
      screenBtn.disabled = true;

      try {
        const response = await fetch("/screen", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ url }),
        });
        const data = await response.json();

        hide(statusBox);
        screenBtn.disabled = false;

        if (!data.ok) {
          errorBox.textContent = data.error || "Something went wrong.";
          show(errorBox);
          return;
        }

        // Populate and reveal the results.
        resultUrl.textContent = data.url;
        resultUrl.href = data.url;
        resultTitle.textContent = data.title;
        resultDesc.textContent = data.description;
        resultSumm.textContent = data.summary;
        show(resultsBox);
        show(clearBtn);
      } catch (err) {
        hide(statusBox);
        screenBtn.disabled = false;
        errorBox.textContent = "Could not reach the server. Is the app running?";
        show(errorBox);
      }
    });

    // --- Clear results so the user can try a new URL --------------------
    clearBtn.addEventListener("click", () => {
      urlInput.value = "";
      hide(resultsBox);
      hide(errorBox);
      hide(clearBtn);
      urlInput.focus();
    });
  </script>
</body>
</html>
